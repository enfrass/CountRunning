<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>RunningCount</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>RunningCount</h1>

    <div id="card" class="card">
    </div>

    <button id="startBtn">
      Iniciar
    </button>

    <p id="result"></p>

  </div>

  <!-- MODAL -->

  <div id="overlay" class="overlay hidden">

    <div class="modal">

      <h2>Qual o Running Count?</h2>

      <input
        type="number"
        id="countInput"
        placeholder="Digite aqui"
      >

      <button id="submitBtn">
        Confirmar
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
