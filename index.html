<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RunningCount</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🃏 RunningCount</h1>

    <div id="card" class="card">
      Clique em iniciar
    </div>

    <button id="startBtn">
      Iniciar
    </button>

    <div id="answerArea" class="hidden">
      <input 
        type="number" 
        id="countInput"
        placeholder="Running Count"
      >

      <button id="submitBtn">
        Confirmar
      </button>
    </div>

    <p id="result"></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
